# Publishes to npm whenever main carries a package.json version that isn't on the registry yet.
# Releasing is therefore just: bump the version in a PR, merge it. Requires an NPM_TOKEN
# repository secret (an npm automation token); provenance links the published tarball back to
# this workflow run.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write # push the version tag + create the GitHub release
  id-token: write # npm provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Decide whether this version needs publishing
        id: version
        run: |
          NAME=$(node -p "require('./package.json').name")
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$NAME" version 2>/dev/null || echo "none")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$LOCAL is already on npm; nothing to do."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$LOCAL is new (npm has $PUBLISHED); will publish."
          fi

      - if: steps.version.outputs.publish == 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.version.outputs.publish == 'true'
        run: pnpm typecheck && pnpm test

      - if: steps.version.outputs.publish == 'true'
        run: pnpm build

      - if: steps.version.outputs.publish == 'true'
        name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - if: steps.version.outputs.publish == 'true'
        name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.local }}
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" --generate-notes --title "v$VERSION"
