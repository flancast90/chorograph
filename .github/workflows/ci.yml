name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Generated code (TS bindings, JSON Schema) must match spec/contract.json.
      - run: pnpm codegen:check

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      # The built CLI must be able to scan the example end to end.
      - run: node packages/chorograph/dist/cli.js render examples/streamline --json --quiet
